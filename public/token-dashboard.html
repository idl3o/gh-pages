<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Dashboard</title>
    <link rel="stylesheet" href="css/token-dashboard.css">
</head>
<body>
    <header>
        <h1>Web3 Crypto Streaming Service</h1>
        <div id="wallet-info">
            <span id="wallet-address">Not connected</span>
            <button id="connect-wallet">Connect Wallet</button>
        </div>
    </header>
    
    <main>
        <section class="dashboard-section" id="token-balance">
            <h2>Token Balance</h2>
            <div class="balance-display">
                <span id="token-amount">0.00</span>
                <span class="token-symbol">TKNS</span>
            </div>
        </section>

        <section class="dashboard-section" id="token-history">
            <h2>Token History</h2>
            <div class="filter-controls">
                <select id="history-filter">
                    <option value="all">All Activity</option>
                    <option value="stream_start">Stream Start</option>
                    <option value="stream_end">Stream End</option>
                    <option value="viewer_watch_time">Watch Time</option>
                    <option value="content_creation">Content Creation</option>
                </select>
            </div>
            <div class="history-list">
                <table id="token-history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Activity</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="token-history-body">
                        <!-- Token history will be populated here -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="dashboard-section" id="pending-tokens">
            <h2>Pending Tokens</h2>
            <div class="pending-list">
                <table id="pending-tokens-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Activity</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="pending-tokens-body">
                        <!-- Pending tokens will be populated here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/token-dashboard.js"></script>
</body>
</html>
